<!DOCTYPE html>

<html class="light" lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>ReciclaCAD — Mis favoritos · Cádiz Sostenible</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;family=DM+Sans:wght@400;500;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary-fixed-dim": "#4ae08f",
            "on-secondary-fixed": "#001c39",
            "error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#004884",
            "surface-tint": "#006d3e",
            "surface-variant": "#e1e3e4",
            "on-primary": "#ffffff",
            "on-error-container": "#93000a",
            "secondary-fixed": "#d4e3ff",
            "on-primary-fixed": "#00210f",
            "surface-container-highest": "#e1e3e4",
            "on-surface-variant": "#3c4a3f",
            "secondary-container": "#499dfe",
            "error": "#ba1a1a",
            "surface-dim": "#d9dadb",
            "surface-container-low": "#f3f4f5",
            "outline-variant": "#bbcabc",
            "surface-container-lowest": "#ffffff",
            "tertiary-fixed": "#ffddb4",
            "on-secondary": "#ffffff",
            "on-tertiary-fixed": "#291800",
            "tertiary-container": "#f2a320",
            "inverse-primary": "#4ae08f",
            "tertiary-fixed-dim": "#ffb955",
            "secondary": "#005fad",
            "inverse-on-surface": "#f0f1f2",
            "on-error": "#ffffff",
            "on-tertiary": "#ffffff",
            "surface-container-high": "#e7e8e9",
            "primary-container": "#2ecc7d",
            "primary-fixed": "#6bfda9",
            "inverse-surface": "#2e3132",
            "on-secondary-container": "#003462",
            "surface-bright": "#f8f9fa",
            "tertiary": "#835500",
            "on-background": "#191c1d",
            "on-tertiary-container": "#613e00",
            "surface": "#f8f9fa",
            "on-surface": "#191c1d",
            "on-primary-container": "#00512c",
            "primary": "#006d3e",
            "on-primary-fixed-variant": "#00522d",
            "outline": "#6c7b6f",
            "on-tertiary-fixed-variant": "#633f00",
            "surface-container": "#edeeef",
            "background": "#f8f9fa",
            "secondary-fixed-dim": "#a4c9ff",
            "neutral-header": "#2d2d2d"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "fontFamily": {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Be Vietnam Pro"],
            "ui": ["DM Sans"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .favorite-fill {
      font-variation-settings: 'FILL' 1;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    button:focus-visible {
      outline: 2px solid rgba(0, 109, 62, 0.6);
      outline-offset: 2px;
    }

    @keyframes favorite-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .btn-favorite:active {
      animation: favorite-pop 0.25s ease-out;
    }

    @media (prefers-reduced-motion: reduce) {
      *, ::before, ::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body class="bg-background text-on-background antialiased">
  <!-- TopNavBar -->
  <header class="fixed top-0 left-0 w-full h-[56px] z-50 bg-neutral-header flex items-center px-4">
    <div
      class="flex items-center gap-2 text-base font-bold text-white before:content-[''] before:w-2 before:h-2 before:bg-primary-container before:rounded-full font-headline tracking-tight">
      ReciclaCAD
    </div>
  </header>
  <div class="flex h-screen pt-[56px]">
    <!-- SideNavBar -->
    <aside
      class="hidden md:flex flex-col fixed left-0 top-[56px] w-[280px] h-[calc(100vh-56px)] z-40 bg-white dark:bg-inverse-surface p-6 gap-6 font-ui text-sm leading-relaxed ghost-border">
      <div>
        <h1 class="text-xl font-bold font-headline text-on-background mb-1">Mis favoritos</h1>
        <p class="text-outline">Cádiz Sostenible</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <button aria-pressed="false" class="flex items-center gap-1.5 px-4 py-2 rounded-full text-[12px] bg-surface-container text-on-surface-variant font-medium transition-transform active:scale-[0.98]">
          <div aria-hidden="true" class="w-2 h-2 rounded-full bg-primary-container flex-shrink-0"></div>
          Vidrio
        </button>
        <button aria-pressed="false" class="flex items-center gap-1.5 px-4 py-2 rounded-full text-[12px] bg-surface-container text-on-surface-variant font-medium transition-transform active:scale-[0.98]">
          <div aria-hidden="true" class="w-2 h-2 rounded-full bg-secondary-container flex-shrink-0"></div>
          Papel
        </button>
        <button aria-pressed="false" class="flex items-center gap-1.5 px-4 py-2 rounded-full text-[12px] bg-surface-container text-on-surface-variant font-medium transition-transform active:scale-[0.98]">
          <div aria-hidden="true" class="w-2 h-2 rounded-full bg-tertiary-container flex-shrink-0"></div>
          Envases
        </button>
        <button aria-pressed="false" class="flex items-center gap-1.5 px-4 py-2 rounded-full text-[12px] bg-surface-container text-on-surface-variant font-medium transition-transform active:scale-[0.98]">
          <div aria-hidden="true" class="w-2 h-2 rounded-full bg-outline flex-shrink-0"></div>
          Pilas
        </button>
        <button aria-pressed="false" class="flex items-center gap-1.5 px-4 py-2 rounded-full text-[12px] bg-surface-container text-on-surface-variant font-medium transition-transform active:scale-[0.98]">
          <div aria-hidden="true" class="w-2 h-2 rounded-full bg-outline flex-shrink-0"></div>
          Ropa
        </button>
      </div>
      <div class="flex-1 overflow-y-auto">
        <div class="text-[12px] text-outline mb-4 px-1 uppercase tracking-wider font-medium">3 favoritos guardados</div>
        <div class="flex flex-col gap-3">
          <!-- Favorite Item 1 -->
          <button
            aria-label="Calle Ancha, 12 — Papel y Cartón, a 250 metros. Ver detalle"
            class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant/15 hover:scale-[0.98] transition-transform duration-200 w-full text-left">
            <div class="flex justify-between items-start mb-2">
              <div class="flex items-center gap-1.5">
                <div aria-hidden="true" class="w-2 h-2 rounded-full bg-secondary-container flex-shrink-0"></div>
                <span class="text-[10px] font-medium text-on-surface-variant">Papel y Cartón</span>
              </div>
              <span aria-hidden="true" class="material-symbols-outlined text-tertiary-container favorite-fill text-lg">favorite</span>
            </div>
            <h3 class="font-bold text-on-surface mb-1">Calle Ancha, 12</h3>
            <div class="flex items-center gap-2 text-outline text-xs">
              <span aria-hidden="true" class="material-symbols-outlined text-[14px]">near_me</span>
              <span>250m</span>
            </div>
          </button>
          <!-- Favorite Item 2 -->
          <button
            aria-label="Plaza Mina, 4 — Vidrio, a 400 metros. Ver detalle"
            class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant/15 hover:scale-[0.98] transition-transform duration-200 w-full text-left">
            <div class="flex justify-between items-start mb-2">
              <div class="flex items-center gap-1.5">
                <div aria-hidden="true" class="w-2 h-2 rounded-full bg-primary-container flex-shrink-0"></div>
                <span class="text-[10px] font-medium text-on-surface-variant">Vidrio</span>
              </div>
              <span aria-hidden="true" class="material-symbols-outlined text-tertiary-container favorite-fill text-lg">favorite</span>
            </div>
            <h3 class="font-bold text-on-surface mb-1">Plaza Mina, 4</h3>
            <div class="flex items-center gap-2 text-outline text-xs">
              <span aria-hidden="true" class="material-symbols-outlined text-[14px]">near_me</span>
              <span>400m</span>
            </div>
          </button>
          <!-- Favorite Item 3 -->
          <button
            aria-label="Mercado Central — Pilas, a 850 metros. Ver detalle"
            class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant/15 hover:scale-[0.98] transition-transform duration-200 w-full text-left">
            <div class="flex justify-between items-start mb-2">
              <div class="flex items-center gap-1.5">
                <div aria-hidden="true" class="w-2 h-2 rounded-full bg-tertiary-container flex-shrink-0"></div>
                <span class="text-[10px] font-medium text-on-surface-variant">Pilas</span>
              </div>
              <span aria-hidden="true" class="material-symbols-outlined text-tertiary-container favorite-fill text-lg">favorite</span>
            </div>
            <h3 class="font-bold text-on-surface mb-1">Mercado Central</h3>
            <div class="flex items-center gap-2 text-outline text-xs">
              <span aria-hidden="true" class="material-symbols-outlined text-[14px]">near_me</span>
              <span>850m</span>
            </div>
          </button>
        </div>
        <!-- Estado vacío (visible cuando no hay favoritos guardados) -->
        <div class="hidden flex-col items-center gap-4 py-6 px-2" aria-live="polite">
          <div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center">
            <span class="material-symbols-outlined text-outline">favorite_border</span>
          </div>
          <div class="text-center">
            <p class="font-headline font-bold text-sm text-on-surface mb-1">Aún sin favoritos</p>
            <p class="text-xs text-outline leading-relaxed">Guarda los puntos que más uses para encontrarlos aquí.</p>
          </div>
        </div>
      </div>
      <a href="index.html"
        class="mt-auto w-full py-3 bg-primary text-on-primary font-bold rounded-full text-center block transition-transform active:scale-[0.98] hover:opacity-90">
        Volver al mapa
      </a>
    </aside>
    <!-- Main Content Area (Map) -->
    <main class="ml-0 w-full md:ml-[280px] md:w-[calc(100%-280px)] h-full relative bg-surface-container-low overflow-hidden">
      <!-- Map Background Representation -->
      <div class="absolute inset-0 z-0">
        <img alt="Plano urbano de Cádiz con calles y línea de costa en tonos grises suaves"
          class="w-full h-full object-cover opacity-60"
          data-location="Cádiz"
          decoding="async"
          fetchpriority="high"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtZLtMElGK2dV7sqCbjxsx-tb1MMNSX6vD7rocTuLHyvMP_qGXwiGVQhS6joeunlQvNOIh1YerMyiNdXPaC92s5Yzt1UoB2d2uO03Yg9JEAXGn3Jd-mtq7w0XFIcxxqD039gkQ5DfmBZe1BdsjX5Yt-8otWQpDrX-Ry8J90EO8nDO7KYp31n4edFpA2gsL2uyuACmoGq08NB_SAlQEaWTlOlWEDKulVqDyBigq9nD-T4X5cJSyuPGwrkOFnCMEcbxZSxYnQG7N2XaT" />
      </div>
      <!-- Mobile Search Overlay -->
      <div class="md:hidden absolute top-4 left-4 right-4 z-20">
        <div
          class="bg-white/90 dark:bg-inverse-surface/90 dark:text-inverse-on-surface backdrop-blur-xl rounded-full flex items-center gap-2 px-4 py-2.5 shadow-sm">
          <span class="material-symbols-outlined text-outline text-[20px]">search</span>
          <input aria-label="Buscar favoritos"
            class="bg-transparent border-none outline-none text-sm flex-1 text-on-surface" placeholder="Buscar favoritos..."
            type="text" />
        </div>
      </div>
      <!-- Favorite Map Pins -->
      <div class="absolute top-[40%] left-[45%] -translate-x-1/2 -translate-y-1/2">
        <button aria-label="Favorito: Punto de reciclaje de vidrio" class="w-11 h-11 flex items-center justify-center">
          <div class="relative">
            <div class="w-6 h-6 bg-primary rounded-full border-4 border-white shadow-md ring-4 ring-primary/25"></div>
            <div class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-tertiary rounded-full border-2 border-white flex items-center justify-center">
              <span aria-hidden="true" class="material-symbols-outlined text-white" style="font-size: 8px; font-variation-settings: 'FILL' 1;">favorite</span>
            </div>
          </div>
        </button>
      </div>
      <div class="absolute top-[25%] left-[60%] -translate-x-1/2 -translate-y-1/2">
        <button aria-label="Favorito: Punto de reciclaje de papel" class="w-11 h-11 flex items-center justify-center">
          <div class="relative">
            <div class="w-5 h-5 bg-secondary rounded-full border-4 border-white shadow-md ring-4 ring-secondary/25"></div>
            <div class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-tertiary rounded-full border-2 border-white flex items-center justify-center">
              <span aria-hidden="true" class="material-symbols-outlined text-white" style="font-size: 8px; font-variation-settings: 'FILL' 1;">favorite</span>
            </div>
          </div>
        </button>
      </div>
      <div class="absolute bottom-[30%] left-[30%] -translate-x-1/2 -translate-y-1/2">
        <button aria-label="Favorito: Punto de reciclaje de pilas" class="w-11 h-11 flex items-center justify-center">
          <div class="relative">
            <div class="w-5 h-5 bg-tertiary rounded-full border-4 border-white shadow-md ring-4 ring-tertiary/25"></div>
            <div class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-tertiary rounded-full border-2 border-white flex items-center justify-center">
              <span aria-hidden="true" class="material-symbols-outlined text-white" style="font-size: 8px; font-variation-settings: 'FILL' 1;">favorite</span>
            </div>
          </div>
        </button>
      </div>
      <!-- Non-favorite point for contrast -->
      <div class="absolute top-[60%] left-[70%] -translate-x-1/2 -translate-y-1/2">
        <button aria-label="Punto de reciclaje de vidrio" class="w-11 h-11 flex items-center justify-center">
          <div class="w-5 h-5 bg-primary-container rounded-full border-2 border-white shadow-sm ring-4 ring-primary-container/20"></div>
        </button>
      </div>
      <!-- Floating Card Detail (Asymmetric Layout) -->
      <div
        class="absolute bottom-[84px] left-3 right-3 md:bottom-8 md:right-8 md:left-auto md:w-[280px] z-30 bg-white/90 dark:bg-inverse-surface/90 dark:text-inverse-on-surface backdrop-blur-xl rounded-2xl p-4 border border-white/30 dark:border-white/10">
        <div class="flex justify-between items-start mb-4">
          <div>
            <span
              class="bg-tertiary-container text-on-tertiary-container text-[10px] font-extrabold px-2 py-1 rounded-full uppercase">Punto
              Destacado</span>
            <h2 class="font-headline font-bold text-base leading-tight text-on-surface mt-1">Calle Ancha, 12</h2>
          </div>
          <div class="flex items-center gap-1">
            <button aria-label="Eliminar de favoritos" class="material-symbols-outlined text-tertiary-container favorite-fill bg-transparent border-0 min-w-[32px] min-h-[32px] flex items-center justify-center btn-favorite hover:scale-110 transition-transform">favorite</button>
            <button aria-label="Cerrar tarjeta" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container/50 transition-colors text-outline">
              <span aria-hidden="true" class="material-symbols-outlined text-[18px]">close</span>
            </button>
          </div>
        </div>
        <div class="flex flex-col gap-4">
          <div class="flex justify-between items-end">
            <div class="flex flex-col gap-1">
              <span class="text-xs text-outline uppercase font-bold tracking-tighter">Capacidad</span>
              <div class="w-32 h-1.5 bg-surface-variant rounded-full overflow-hidden">
                <div class="w-3/4 h-full bg-primary"></div>
              </div>
            </div>
            <span class="text-xs font-bold text-primary">75%</span>
          </div>
          <button
            class="w-full h-[36px] bg-primary text-on-primary hover:opacity-90 active:scale-[0.98] transition-all font-ui font-medium text-[13px] rounded-xl flex items-center justify-center gap-2 mt-1">
            <span aria-hidden="true" class="material-symbols-outlined text-base">directions</span>
            Cómo llegar
          </button>
        </div>
      </div>
    </main>
  </div>
  <!-- BottomNavBar (Mobile Only) -->
  <nav aria-label="Categorías de reciclaje" class="md:hidden fixed bottom-0 left-0 w-full h-[72px] bg-white dark:bg-inverse-surface dark:border-t dark:border-outline-variant/15 flex items-center justify-around px-2 z-50">
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">recycling</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Vidrio</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">description</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Papel</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">inventory_2</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Envases</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">battery_charging_full</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Pilas</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">checkroom</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Ropa</span>
    </button>
  </nav>
</body>

</html>
