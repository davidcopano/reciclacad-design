<!DOCTYPE html>

<html class="light" lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>ReciclaCAD - Mis favoritos</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;family=DM+Sans:wght@400;500;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary-fixed-dim": "#4ae08f",
            "on-secondary-fixed": "#001c39",
            "error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#004884",
            "surface-tint": "#006d3e",
            "surface-variant": "#e1e3e4",
            "on-primary": "#ffffff",
            "on-error-container": "#93000a",
            "secondary-fixed": "#d4e3ff",
            "on-primary-fixed": "#00210f",
            "surface-container-highest": "#e1e3e4",
            "on-surface-variant": "#3c4a3f",
            "secondary-container": "#499dfe",
            "error": "#ba1a1a",
            "surface-dim": "#d9dadb",
            "surface-container-low": "#f3f4f5",
            "outline-variant": "#bbcabc",
            "surface-container-lowest": "#ffffff",
            "tertiary-fixed": "#ffddb4",
            "on-secondary": "#ffffff",
            "on-tertiary-fixed": "#291800",
            "tertiary-container": "#f2a320",
            "inverse-primary": "#4ae08f",
            "tertiary-fixed-dim": "#ffb955",
            "secondary": "#005fad",
            "inverse-on-surface": "#f0f1f2",
            "on-error": "#ffffff",
            "on-tertiary": "#ffffff",
            "surface-container-high": "#e7e8e9",
            "primary-container": "#2ecc7d",
            "primary-fixed": "#6bfda9",
            "inverse-surface": "#2e3132",
            "on-secondary-container": "#003462",
            "surface-bright": "#f8f9fa",
            "tertiary": "#835500",
            "on-background": "#191c1d",
            "on-tertiary-container": "#613e00",
            "surface": "#f8f9fa",
            "on-surface": "#191c1d",
            "on-primary-container": "#00512c",
            "primary": "#006d3e",
            "on-primary-fixed-variant": "#00522d",
            "outline": "#6c7b6f",
            "on-tertiary-fixed-variant": "#633f00",
            "surface-container": "#edeeef",
            "background": "#f8f9fa",
            "secondary-fixed-dim": "#a4c9ff",
            "neutral-header": "#2d2d2d"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "fontFamily": {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Be Vietnam Pro"],
            "ui": ["DM Sans"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .favorite-fill {
      font-variation-settings: 'FILL' 1;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
    }
  </style>
</head>

<body class="bg-background text-on-surface antialiased overflow-hidden">
  <!-- TopNavBar -->
  <header class="fixed top-0 left-0 w-full h-[56px] z-50 bg-neutral-header flex items-center px-4">
    <div
      class="flex items-center gap-2 text-base font-bold text-white before:content-[''] before:w-2 before:h-2 before:bg-primary-container before:rounded-full font-headline tracking-tight">
      ReciclaCAD
    </div>
    <div class="ml-auto flex items-center gap-4">
      <button aria-label="Mi cuenta" class="text-outline hover:opacity-80 transition-opacity">
        <span aria-hidden="true" class="material-symbols-outlined">account_circle</span>
      </button>
    </div>
  </header>
  <div class="flex h-screen pt-[56px]">
    <!-- SideNavBar -->
    <aside
      class="hidden md:flex flex-col fixed left-0 top-[56px] w-[280px] h-[calc(100vh-56px)] z-40 bg-white dark:bg-inverse-surface p-6 gap-6 font-ui text-sm leading-relaxed">
      <div class="flex flex-col gap-1">
        <h1 class="text-on-surface font-bold text-lg">Encuentra tu punto</h1>
        <p class="text-outline text-xs">Cádiz Sostenible</p>
      </div>
      <nav class="flex flex-col gap-2">
        <button
          class="flex items-center gap-3 text-on-surface-variant bg-surface-container rounded-full px-4 py-2 hover:bg-surface-container-low transition-colors w-full text-left">
          <span aria-hidden="true" class="material-symbols-outlined text-primary-container">recycling</span>
          <span>Vidrio</span>
        </button>
        <button
          class="flex items-center gap-3 text-on-surface-variant bg-surface-container rounded-full px-4 py-2 hover:bg-surface-container-low transition-colors w-full text-left">
          <span aria-hidden="true" class="material-symbols-outlined text-primary-container">description</span>
          <span>Papel</span>
        </button>
        <button
          class="flex items-center gap-3 text-on-surface-variant bg-surface-container rounded-full px-4 py-2 hover:bg-surface-container-low transition-colors w-full text-left">
          <span aria-hidden="true" class="material-symbols-outlined text-primary-container">inventory_2</span>
          <span>Envases</span>
        </button>
      </nav>
      <div class="mt-4 flex flex-col gap-4 overflow-y-auto">
        <h2 class="font-headline font-bold text-[15px] text-on-surface px-1">Mis favoritos</h2>
        <div class="flex flex-col gap-3">
          <!-- Favorite Item 1 -->
          <button
            aria-label="Calle Ancha, 12 — Papel y Cartón, a 250 metros. Ver detalle"
            class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant/15 hover:scale-[0.98] transition-transform duration-200 w-full text-left">
            <div class="flex justify-between items-start mb-2">
              <span class="text-[10px] font-bold text-secondary uppercase tracking-wider">Papel y Cartón</span>
              <span aria-hidden="true" class="material-symbols-outlined text-tertiary-container favorite-fill text-lg">favorite</span>
            </div>
            <h3 class="font-bold text-on-surface mb-1">Calle Ancha, 12</h3>
            <div class="flex items-center gap-2 text-outline text-xs">
              <span aria-hidden="true" class="material-symbols-outlined text-[14px]">distance</span>
              <span>250m</span>
            </div>
          </button>
          <!-- Favorite Item 2 -->
          <button
            aria-label="Plaza Mina, 4 — Vidrio, a 400 metros. Ver detalle"
            class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant/15 hover:scale-[0.98] transition-transform duration-200 w-full text-left">
            <div class="flex justify-between items-start mb-2">
              <span class="text-[10px] font-bold text-primary uppercase tracking-wider">Vidrio</span>
              <span aria-hidden="true" class="material-symbols-outlined text-tertiary-container favorite-fill text-lg">favorite</span>
            </div>
            <h3 class="font-bold text-on-surface mb-1">Plaza Mina, 4</h3>
            <div class="flex items-center gap-2 text-outline text-xs">
              <span aria-hidden="true" class="material-symbols-outlined text-[14px]">distance</span>
              <span>400m</span>
            </div>
          </button>
          <!-- Favorite Item 3 -->
          <button
            aria-label="Mercado Central — Pilas, a 850 metros. Ver detalle"
            class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant/15 hover:scale-[0.98] transition-transform duration-200 w-full text-left">
            <div class="flex justify-between items-start mb-2">
              <span class="text-[10px] font-bold text-tertiary uppercase tracking-wider">Pilas</span>
              <span aria-hidden="true" class="material-symbols-outlined text-tertiary-container favorite-fill text-lg">favorite</span>
            </div>
            <h3 class="font-bold text-on-surface mb-1">Mercado Central</h3>
            <div class="flex items-center gap-2 text-outline text-xs">
              <span aria-hidden="true" class="material-symbols-outlined text-[14px]">distance</span>
              <span>850m</span>
            </div>
          </button>
        </div>
      </div>
      <div class="mt-auto pt-6 border-t border-surface-container-high">
        <button
          class="w-full bg-primary-container text-on-primary-container font-bold py-3 rounded-xl hover:opacity-90 transition-opacity mb-4">
          Filtrar Mapa
        </button>
        <p class="font-ui font-normal text-[11px] text-outline text-center uppercase tracking-widest">Guardado
          en tu dispositivo</p>
      </div>
    </aside>
    <!-- Main Content Area (Map) -->
    <main class="ml-0 w-full md:ml-[280px] md:w-[calc(100%-280px)] h-full relative bg-surface-container-low">
      <!-- Map Background Representation -->
      <div class="absolute inset-0 z-0">
        <img alt="Plano urbano de Cádiz con calles y línea de costa en tonos grises suaves" class="w-full h-full object-cover opacity-60"
          data-location="Cádiz"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtZLtMElGK2dV7sqCbjxsx-tb1MMNSX6vD7rocTuLHyvMP_qGXwiGVQhS6joeunlQvNOIh1YerMyiNdXPaC92s5Yzt1UoB2d2uO03Yg9JEAXGn3Jd-mtq7w0XFIcxxqD039gkQ5DfmBZe1BdsjX5Yt-8otWQpDrX-Ry8J90EO8nDO7KYp31n4edFpA2gsL2uyuACmoGq08NB_SAlQEaWTlOlWEDKulVqDyBigq9nD-T4X5cJSyuPGwrkOFnCMEcbxZSxYnQG7N2XaT" />
      </div>
      <!-- Map UI Overlays -->
      <div class="absolute top-4 left-2 right-2 md:top-6 md:left-6 md:right-auto z-10 flex gap-4">
        <div class="bg-white/85 backdrop-blur-md px-6 py-3 rounded-full flex items-center gap-3 border border-white/20 w-full md:w-auto">
          <span class="material-symbols-outlined text-outline">search</span>
          <input aria-label="Buscar ubicación" class="bg-transparent border-none focus-visible:ring-2 focus-visible:ring-primary/30 text-sm flex-1 text-on-surface outline-none"
            placeholder="Buscar ubicación..." type="text" />
        </div>
      </div>
      <!-- Favorite Map Pins -->
      <button aria-label="Favorito: Punto de reciclaje de vidrio" class="absolute top-[40%] left-[45%] z-20 group">
        <div class="relative w-11 h-11 flex items-center justify-center">
          <div
            class="w-10 h-10 bg-primary rounded-full border-2 border-tertiary-container flex items-center justify-center text-white">
            <span class="material-symbols-outlined text-base">recycling</span>
          </div>
          <div class="absolute top-1 right-1 w-3 h-3 bg-tertiary-container rounded-full border border-white"></div>
        </div>
      </button>
      <button aria-label="Favorito: Punto de reciclaje de papel" class="absolute top-[25%] left-[60%] z-20 group">
        <div class="relative w-11 h-11 flex items-center justify-center">
          <div
            class="w-10 h-10 bg-secondary rounded-full border-2 border-tertiary-container flex items-center justify-center text-white">
            <span class="material-symbols-outlined text-base">description</span>
          </div>
          <div class="absolute top-1 right-1 w-3 h-3 bg-tertiary-container rounded-full border border-white"></div>
        </div>
      </button>
      <button aria-label="Favorito: Punto de reciclaje de pilas" class="absolute bottom-[30%] left-[30%] z-20 group">
        <div class="relative w-11 h-11 flex items-center justify-center">
          <div
            class="w-10 h-10 bg-tertiary rounded-full border-2 border-tertiary-container flex items-center justify-center text-white">
            <span class="material-symbols-outlined text-base">battery_charging_full</span>
          </div>
          <div class="absolute top-1 right-1 w-3 h-3 bg-tertiary-container rounded-full border border-white"></div>
        </div>
      </button>
      <!-- Non-favorite point for contrast -->
      <button aria-label="Punto de reciclaje de vidrio" class="absolute top-[60%] left-[70%] z-20 group w-11 h-11 flex items-center justify-center">
        <div
          class="w-10 h-10 bg-primary-container/80 backdrop-blur-sm rounded-full border-2 border-white flex items-center justify-center text-on-primary-container">
          <span class="material-symbols-outlined text-base">recycling</span>
        </div>
      </button>
      <!-- Floating Card Detail (Asymmetric Layout) -->
      <div
        class="absolute bottom-[84px] left-3 right-3 md:bottom-10 md:right-10 md:left-auto md:w-80 z-30 bg-white/90 backdrop-blur-xl rounded-2xl p-6 border border-white/30">
        <div class="flex justify-between items-start mb-4">
          <div>
            <span
              class="bg-tertiary-container text-on-tertiary-container text-[10px] font-extrabold px-2 py-1 rounded-full uppercase">Punto
              Destacado</span>
            <h4 class="text-xl font-headline font-bold mt-2">Calle Ancha, 12</h4>
          </div>
          <span aria-label="Eliminar de favoritos" class="material-symbols-outlined text-tertiary-container favorite-fill">favorite</span>
        </div>
        <div class="flex flex-col gap-4">
          <div class="flex justify-between items-end">
            <div class="flex flex-col gap-1">
              <span class="text-xs text-outline uppercase font-bold tracking-tighter">Capacidad</span>
              <div class="w-32 h-1.5 bg-surface-variant rounded-full overflow-hidden">
                <div class="w-3/4 h-full bg-primary"></div>
              </div>
            </div>
            <span class="text-xs font-bold text-primary">75%</span>
          </div>
          <button
            class="w-full bg-on-background text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-base">directions</span>
            Cómo llegar
          </button>
        </div>
      </div>
    </main>
  </div>
  <!-- BottomNavBar (Mobile Only) -->
  <nav aria-label="Categorías de reciclaje" class="md:hidden fixed bottom-0 left-0 w-full h-[72px] bg-white flex items-center justify-around px-2 z-50">
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">recycling</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Vidrio</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">description</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Papel</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">inventory_2</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Envases</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">battery_charging_full</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Pilas</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">checkroom</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Ropa</span>
    </button>
  </nav>
</body>

</html>
