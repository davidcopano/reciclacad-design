  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .ghost-border {
      border: 1px solid rgba(187, 202, 188, 0.15);
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    button:focus-visible {
      outline: 2px solid rgba(0, 109, 62, 0.6);
      outline-offset: 2px;
    }

    @keyframes favorite-pop {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.3);
      }

      100% {
        transform: scale(1);
      }
    }

    .btn-favorite:active {
      animation: favorite-pop 0.25s ease-out;
    }

    .loading-shell {
      display: none;
    }

    .skeleton-block {
      position: relative;
      overflow: hidden;
      background-color: rgba(187, 202, 188, 0.18);
    }

    .skeleton-block::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg,
          rgba(187, 202, 188, 0) 0%,
          rgba(187, 202, 188, 0.32) 50%,
          rgba(187, 202, 188, 0) 100%);
      animation: skeleton-shimmer 1.6s ease-in-out infinite;
    }

    @keyframes skeleton-shimmer {
      100% {
        transform: translateX(100%);
      }
    }

    body[data-loading="true"] .app-shell {
      visibility: hidden;
      pointer-events: none;
      user-select: none;
    }

    body[data-loading="true"] .loading-shell {
      display: block;
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      ::before,
      ::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      .skeleton-block::after {
        content: none;
      }
    }

    /* Floating detail card: type chips color mapping (light + dark) */
    [data-point-detail-type] {
      padding: 0.3125rem 0.625rem;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      display: inline-block;
    }

    /* Vidrio (primary) */
    [data-point-detail-type][data-type="vidrio"] {
      background-color: rgba(46, 204, 125, 0.20);
      color: #00512c;
    }
    .dark [data-point-detail-type][data-type="vidrio"] {
      background-color: rgba(46, 204, 125, 0.10);
      color: #2ecc7d;
    }

    /* Papel (secondary) */
    [data-point-detail-type][data-type="papel"] {
      background-color: rgba(73, 157, 254, 0.15);
      color: #003462;
    }
    .dark [data-point-detail-type][data-type="papel"] {
      background-color: rgba(73, 157, 254, 0.10);
      color: #499dfe;
    }

    /* Envases (tertiary) */
    [data-point-detail-type][data-type="envases"] {
      background-color: rgba(242, 163, 32, 0.15);
      color: #613e00;
    }
    .dark [data-point-detail-type][data-type="envases"] {
      background-color: rgba(242, 163, 32, 0.10);
      color: #f2a320;
    }

    /* Pilas (quaternary) */
    [data-point-detail-type][data-type="pilas"] {
      background-color: rgba(151, 240, 255, 0.15);
      color: #001F26;
    }
    .dark [data-point-detail-type][data-type="pilas"] {
      background-color: rgba(151, 240, 255, 0.10);
      color: #006877;
    }

    /* Ropa (quinary) */
    [data-point-detail-type][data-type="ropa"] {
      background-color: rgba(238, 220, 255, 0.15);
      color: #261141;
    }
    .dark [data-point-detail-type][data-type="ropa"] {
      background-color: rgba(238, 220, 255, 0.10);
      color: #6B538C;
    }

    /* Filter chips: stateful design for active/inactive across breakpoints */
    [data-filter-chip] {
      position: relative;
      border: 1px solid transparent;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    @media (max-width: 768px) {
      [data-filter-chip] {
        background: transparent !important;
        border-color: transparent !important;
      }
    }

    [data-filter-chip] .material-symbols-outlined {
      transition: transform 0.2s ease;
    }

    [data-filter-chip][aria-pressed="false"] {
      background-color: rgba(237, 238, 239, 0.92);
      border-color: rgba(108, 123, 111, 0.2);
      color: #3c4a3f;
    }

    .dark [data-filter-chip][aria-pressed="false"] {
      background-color: rgba(255, 255, 255, 0.04);
      border-color: rgba(187, 202, 188, 0.16);
      color: rgba(240, 241, 242, 0.72);
    }

    [data-filter-chip][aria-pressed="true"] {
      transform: translateY(-1px);
      box-shadow: 0px 12px 32px rgba(25, 28, 29, 0.06);
      border-color: rgba(var(--chip-accent-rgb), 0.5);
      color: var(--chip-text);
      background:
        linear-gradient(180deg, rgba(var(--chip-accent-rgb), 0.16) 0%, rgba(var(--chip-accent-rgb), 0.1) 100%),
        rgba(255, 255, 255, 0.92);
    }

    .dark [data-filter-chip][aria-pressed="true"] {
      color: var(--chip-text-dark);
      border-color: rgba(var(--chip-accent-rgb), 0.45);
      background:
        linear-gradient(180deg, rgba(var(--chip-accent-rgb), 0.2) 0%, rgba(var(--chip-accent-rgb), 0.12) 100%),
        rgba(46, 49, 50, 0.9);
    }

    [data-filter-chip][aria-pressed="true"] .material-symbols-outlined {
      transform: scale(1.06);
      font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
    }

    [data-filter-chip][data-filter-type="vidrio"] {
      --chip-accent-rgb: 46, 204, 125;
      --chip-text: #00512c;
      --chip-text-dark: #2ecc7d;

      --chip-text-dark: #499dfe;

      --chip-accent-rgb: 151, 240, 255;
      --chip-text: #001f26;
      --chip-text-dark: #97f0ff;

      --chip-accent-rgb: 238, 220, 255;
      --chip-text: #261141;
      --chip-text-dark: #eedcff;
    }
  </style>
</head>

  <script>
    (function () {
      var root = document.documentElement;
      var saved = localStorage.getItem('reciclacad-theme');
      if (saved === 'dark') { root.classList.add('dark'); }
      else if (saved === 'light') { root.classList.remove('dark'); }

      document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('dark-mode-toggle');
        var icon = document.getElementById('dark-mode-icon');

        function syncUI() {
          var isDark = root.classList.contains('dark');
          icon.textContent = isDark ? 'dark_mode' : 'light_mode';
          btn.setAttribute('aria-label', isDark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro');
        }

        syncUI();
        btn.addEventListener('click', function () {
          root.classList.toggle('dark');
          localStorage.setItem('reciclacad-theme', root.classList.contains('dark') ? 'dark' : 'light');
          syncUI();
        });

        var chips = Array.prototype.slice.call(document.querySelectorAll('[data-filter-chip][data-filter-type]'));
        var labels = {
          vidrio: 'vidrio',
          papel: 'papel',
          envases: 'envases',
          pilas: 'pilas',
          ropa: 'ropa'
        };

        function setChipStateByType(type, enabled) {
          chips.forEach(function (chip) {
            if (chip.dataset.filterType !== type) return;
            chip.setAttribute('aria-pressed', enabled ? 'true' : 'false');
            chip.setAttribute('aria-label', (enabled ? 'Desactivar filtro de ' : 'Activar filtro de ') + (labels[type] || type));
          });
        }

        var initialized = {};
        chips.forEach(function (chip) {
          var type = chip.dataset.filterType;
          var isActive = chip.getAttribute('aria-pressed') === 'true';

          if (!initialized[type]) {
            setChipStateByType(type, isActive);
            initialized[type] = true;
          }
        });

        chips.forEach(function (chip) {
          chip.addEventListener('click', function () {
            var type = chip.dataset.filterType;
            var nextState = chip.getAttribute('aria-pressed') !== 'true';
            setChipStateByType(type, nextState);
          });
        });
      });
    })();
  </script>
