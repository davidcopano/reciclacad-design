<!DOCTYPE html>

<html class="light" lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>ReciclaCAD</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;family=DM+Sans:wght@400;500;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary-fixed-dim": "#4ae08f",
            "on-secondary-fixed": "#001c39",
            "error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#004884",
            "surface-tint": "#006d3e",
            "surface-variant": "#e1e3e4",
            "on-primary": "#ffffff",
            "on-error-container": "#93000a",
            "secondary-fixed": "#d4e3ff",
            "on-primary-fixed": "#00210f",
            "surface-container-highest": "#e1e3e4",
            "on-surface-variant": "#3c4a3f",
            "secondary-container": "#499dfe",
            "error": "#ba1a1a",
            "surface-dim": "#d9dadb",
            "surface-container-low": "#f3f4f5",
            "outline-variant": "#bbcabc",
            "surface-container-lowest": "#ffffff",
            "tertiary-fixed": "#ffddb4",
            "on-secondary": "#ffffff",
            "on-tertiary-fixed": "#291800",
            "tertiary-container": "#f2a320",
            "inverse-primary": "#4ae08f",
            "tertiary-fixed-dim": "#ffb955",
            "secondary": "#005fad",
            "inverse-on-surface": "#f0f1f2",
            "on-error": "#ffffff",
            "on-tertiary": "#ffffff",
            "surface-container-high": "#e7e8e9",
            "primary-container": "#2ecc7d",
            "primary-fixed": "#6bfda9",
            "inverse-surface": "#2e3132",
            "on-secondary-container": "#003462",
            "surface-bright": "#f8f9fa",
            "tertiary": "#835500",
            "on-background": "#191c1d",
            "on-tertiary-container": "#613e00",
            "surface": "#f8f9fa",
            "on-surface": "#191c1d",
            "on-primary-container": "#00512c",
            "primary": "#006d3e",
            "on-primary-fixed-variant": "#00522d",
            "outline": "#6c7b6f",
            "on-tertiary-fixed-variant": "#633f00",
            "surface-container": "#edeeef",
            "background": "#f8f9fa",
            "secondary-fixed-dim": "#a4c9ff",
            "neutral-header": "#2d2d2d"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "fontFamily": {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Be Vietnam Pro"],
            "ui": ["DM Sans"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .ghost-border {
      border: 1px solid rgba(187, 202, 188, 0.15);
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    button:focus-visible {
      outline: 2px solid rgba(0, 109, 62, 0.6);
      outline-offset: 2px;
    }

    @keyframes favorite-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .btn-favorite:active {
      animation: favorite-pop 0.25s ease-out;
    }

    @media (prefers-reduced-motion: reduce) {
      *, ::before, ::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body class="bg-background text-on-background">
  <!-- TopNavBar -->
  <header class="fixed top-0 left-0 w-full h-[56px] z-50 bg-neutral-header flex items-center px-4">
    <div
      class="flex items-center gap-2 text-base font-bold text-white before:content-[''] before:w-2 before:h-2 before:bg-primary-container before:rounded-full font-headline tracking-tight">
      ReciclaCAD
    </div>
    <div class="ml-auto flex items-center gap-4">
      <button aria-label="Mi cuenta" class="material-symbols-outlined text-white hover:opacity-80 transition-opacity">account_circle</button>
    </div>
  </header>
  <div class="flex h-screen pt-[56px]">
    <!-- SideNavBar -->
    <aside
      class="hidden md:flex flex-col fixed left-0 top-[56px] w-[280px] h-[calc(100vh-56px)] z-40 bg-white dark:bg-inverse-surface p-6 gap-6 font-ui text-sm leading-relaxed ghost-border">
      <div>
        <h1 class="text-xl font-bold font-headline text-on-background mb-1">Encuentra tu punto</h1>
        <p class="text-outline">Cádiz Sostenible</p>
      </div>
      <!-- Search Bar -->
      <div class="relative">
        <span
          class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">search</span>
        <input
          aria-label="Buscar municipio o dirección"
          class="w-full bg-surface-container-low border-none rounded-xl pl-10 py-2 text-sm focus:ring-2 focus:ring-primary/20 outline-none"
          placeholder="Buscar municipio o dirección..." type="text" />
      </div>
      <!-- Filter Chips (Thematic) -->
      <div class="flex flex-wrap gap-2">
        <!-- Vidrio (Primary) -->
        <button
          aria-pressed="true"
          class="flex items-center gap-1.5 px-4 py-2 rounded-full text-[12px] bg-primary-container/15 text-on-primary-container border border-primary-container font-medium transition-transform active:scale-[0.98]">
          <span class="material-symbols-outlined text-[16px]">recycling</span>
          Vidrio
        </button>
        <!-- Papel (Secondary) -->
        <button
          aria-pressed="true"
          class="flex items-center gap-1.5 px-4 py-2 rounded-full text-[12px] bg-secondary-container/15 text-on-secondary-container border border-secondary-container font-medium transition-transform active:scale-[0.98]">
          <span class="material-symbols-outlined text-[16px]">description</span>
          Papel
        </button>
        <!-- Envases (Tertiary) -->
        <button
          aria-pressed="true"
          class="flex items-center gap-1.5 px-4 py-2 rounded-full text-[12px] bg-tertiary-container/15 text-on-tertiary-container border border-tertiary-container font-medium transition-transform active:scale-[0.98]">
          <span class="material-symbols-outlined text-[16px]">inventory_2</span>
          Envases
        </button>
        <!-- Pilas (Inactive) -->
        <button
          aria-pressed="false"
          class="flex items-center gap-1.5 px-4 py-2 rounded-full text-[12px] bg-surface-container text-on-surface-variant font-medium transition-transform active:scale-[0.98]">
          <span class="material-symbols-outlined text-[16px]">battery_charging_full</span>
          Pilas
        </button>
        <!-- Ropa (Inactive) -->
        <button
          aria-pressed="false"
          class="flex items-center gap-1.5 px-4 py-2 rounded-full text-[12px] bg-surface-container text-on-surface-variant font-medium transition-transform active:scale-[0.98]">
          <span class="material-symbols-outlined text-[16px]">checkroom</span>
          Ropa
        </button>
      </div>
      <div class="mt-4 flex-1 overflow-y-auto">
        <div class="text-[12px] text-outline mb-4 px-2 uppercase tracking-wider font-medium">342
          puntos encontrados</div>
        <div class="space-y-1">
          <!-- Point Item 1 -->
          <button
            aria-label="Av. Ana de Viya, 12 — a 250 metros. Ver detalle"
            class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors group text-left">
            <div class="flex items-center gap-3">
              <div class="w-[10px] h-[10px] rounded-full bg-primary-container flex-shrink-0"></div>
              <div>
                <div class="text-[13px] font-medium text-on-surface">Av. Ana de Viya, 12</div>
                <div class="text-[11px] text-outline">A 250m de ti</div>
              </div>
            </div>
            <span aria-hidden="true"
              class="material-symbols-outlined text-outline-variant opacity-70 group-hover:opacity-100 transition-opacity text-[18px]">favorite</span>
          </button>
          <!-- Point Item 2 -->
          <button
            aria-label="Plaza de las Flores, 3 — a 400 metros. Ver detalle"
            class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors group text-left">
            <div class="flex items-center gap-3">
              <div class="w-[10px] h-[10px] rounded-full bg-secondary-container flex-shrink-0"></div>
              <div>
                <div class="text-[13px] font-medium text-on-surface">Plaza de las Flores, 3</div>
                <div class="text-[11px] text-outline">A 400m de ti</div>
              </div>
            </div>
            <span aria-hidden="true"
              class="material-symbols-outlined text-outline-variant opacity-70 group-hover:opacity-100 transition-opacity text-[18px]">favorite</span>
          </button>
          <!-- Point Item 3 -->
          <button
            aria-label="Calle Columela, 18 — a 600 metros. Ver detalle"
            class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors group text-left">
            <div class="flex items-center gap-3">
              <div class="w-[10px] h-[10px] rounded-full bg-tertiary-container flex-shrink-0"></div>
              <div>
                <div class="text-[13px] font-medium text-on-surface">Calle Columela, 18</div>
                <div class="text-[11px] text-outline">A 600m de ti</div>
              </div>
            </div>
            <span aria-hidden="true"
              class="material-symbols-outlined text-outline-variant opacity-70 group-hover:opacity-100 transition-opacity text-[18px]">favorite</span>
          </button>
          <!-- Point Item 4 -->
          <button
            aria-label="Paseo Marítimo, 45 — a 850 metros. Ver detalle"
            class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-surface-container-low transition-colors group text-left">
            <div class="flex items-center gap-3">
              <div class="w-[10px] h-[10px] rounded-full bg-primary-container flex-shrink-0"></div>
              <div>
                <div class="text-[13px] font-medium text-on-surface">Paseo Marítimo, 45</div>
                <div class="text-[11px] text-outline">A 850m de ti</div>
              </div>
            </div>
            <span aria-hidden="true"
              class="material-symbols-outlined text-outline-variant opacity-70 group-hover:opacity-100 transition-opacity text-[18px]">favorite</span>
          </button>
        </div>
      </div>
      <button
        class="mt-auto w-full py-3 bg-primary text-on-primary font-bold rounded-full transition-transform active:scale-[0.98] hover:opacity-90">
        Mis favoritos
      </button>
    </aside>
    <!-- Main Map Area -->
    <main class="ml-0 md:ml-[280px] flex-1 relative bg-surface-container-low overflow-hidden" data-location="Cadiz, Spain">
      <img
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAReAK3WTzPqqwdpGtpb_6-2f-yn2qp2vX9t3K9MOPFeukaP0lvxW7g9g8u9fHqxzUqzlJri6-eCq1HXh_6GjBg1LxU-9FL3AIFIzO1FnpAJtStFm7AZhxbZyWGnaRSeYk_YOGzCPQUfG5hIbAmOl7FAFeaN2gtuUjbmE8PPddTP6Y_E9Wl3n69oX9ArnuVOjGcDiy3vAj5G3tjGGRAINrBEOaIOKtxDO29hF0pmfdxeZ_zPpCz00tm0QnmyqbZctHNdHTKHM8IPERN"
        alt=""
        decoding="async"
        fetchpriority="high"
        class="absolute inset-0 w-full h-full object-cover opacity-30"
        aria-hidden="true" />
      <!-- Mobile Search Overlay -->
      <div class="md:hidden absolute top-4 left-4 right-16 z-20">
        <div class="bg-white/90 dark:bg-inverse-surface/90 dark:text-inverse-on-surface backdrop-blur-xl rounded-full flex items-center gap-2 px-4 py-2.5 shadow-sm">
          <span class="material-symbols-outlined text-outline text-[20px]">search</span>
          <input aria-label="Buscar punto de reciclaje" class="bg-transparent border-none outline-none text-sm flex-1 text-on-surface" placeholder="Buscar punto..." type="text" />
        </div>
      </div>
      <!-- Map Pointers -->
      <!-- Glass Point -->
      <div class="absolute top-[20%] left-[30%] -translate-x-1/2 -translate-y-1/2">
        <button aria-label="Punto de reciclaje de vidrio" class="w-11 h-11 flex items-center justify-center">
          <div class="w-5 h-5 bg-primary-container rounded-full border-2 border-white shadow-sm ring-4 ring-primary-container/20"></div>
        </button>
      </div>
      <!-- Paper Point -->
      <div class="absolute top-[45%] left-[55%] -translate-x-1/2 -translate-y-1/2">
        <button aria-label="Punto de reciclaje de papel" class="w-11 h-11 flex items-center justify-center">
          <div class="w-5 h-5 bg-secondary-container rounded-full border-2 border-white shadow-sm ring-4 ring-secondary-container/20"></div>
        </button>
      </div>
      <!-- Container Point -->
      <div class="absolute top-[30%] left-[70%] -translate-x-1/2 -translate-y-1/2">
        <button aria-label="Punto de reciclaje de envases" class="w-11 h-11 flex items-center justify-center">
          <div class="w-5 h-5 bg-tertiary-container rounded-full border-2 border-white shadow-sm ring-4 ring-tertiary-container/20"></div>
        </button>
      </div>
      <!-- Glass Point 2 -->
      <div class="absolute top-[65%] left-[40%] -translate-x-1/2 -translate-y-1/2">
        <button aria-label="Punto de reciclaje de vidrio" class="w-11 h-11 flex items-center justify-center">
          <div class="w-5 h-5 bg-primary-container rounded-full border-2 border-white shadow-sm ring-4 ring-primary-container/20"></div>
        </button>
      </div>
      <!-- Paper Point 2 -->
      <div class="absolute top-[80%] left-[25%] -translate-x-1/2 -translate-y-1/2">
        <button aria-label="Punto de reciclaje de papel" class="w-11 h-11 flex items-center justify-center">
          <div class="w-5 h-5 bg-secondary-container rounded-full border-2 border-white shadow-sm ring-4 ring-secondary-container/20"></div>
        </button>
      </div>
      <!-- Container Point 2 -->
      <div class="absolute top-[75%] left-[65%] -translate-x-1/2 -translate-y-1/2">
        <button aria-label="Punto de reciclaje de envases" class="w-11 h-11 flex items-center justify-center">
          <div class="w-5 h-5 bg-tertiary-container rounded-full border-2 border-white shadow-sm ring-4 ring-tertiary-container/20"></div>
        </button>
      </div>
      <!-- Floating Action Button -->
      <button
        aria-label="Mi ubicación"
        class="absolute bottom-[88px] right-4 md:bottom-4 w-11 h-11 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-transform shadow-lg">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
      </button>
      <!-- Map Controls (Minimalist) -->
      <div class="absolute top-4 right-4 flex flex-col gap-2">
        <div class="bg-white/90 dark:bg-inverse-surface/90 backdrop-blur-md p-1 rounded-lg flex flex-col items-center">
          <button aria-label="Ampliar mapa" class="w-11 h-11 flex items-center justify-center hover:bg-surface-container rounded-md transition-colors"><span
              aria-hidden="true" class="material-symbols-outlined text-[20px] text-on-surface">add</span></button>
          <div class="h-[1px] w-4 bg-surface-container-high"></div>
          <button aria-label="Alejar mapa" class="w-11 h-11 flex items-center justify-center hover:bg-surface-container rounded-md transition-colors"><span
              aria-hidden="true" class="material-symbols-outlined text-[20px] text-on-surface">remove</span></button>
        </div>
        <button aria-label="Ver capas del mapa" class="w-11 h-11 flex items-center justify-center bg-white/90 dark:bg-inverse-surface/90 backdrop-blur-md rounded-lg text-on-surface dark:text-inverse-on-surface hover:bg-white dark:hover:bg-inverse-surface transition-colors">
          <span aria-hidden="true" class="material-symbols-outlined text-[20px]">layers</span>
        </button>
      </div>
    </main>
  </div>
  <!-- BottomNavBar (Mobile Only) -->
  <nav aria-label="Categorías de reciclaje" class="md:hidden fixed bottom-0 left-0 w-full h-[72px] bg-white dark:bg-inverse-surface dark:border-t dark:border-outline-variant/15 flex items-center justify-around px-2 z-50">
    <button class="flex flex-col items-center gap-1 text-primary dark:text-primary-container min-w-[44px] min-h-[44px] justify-center">
      <div class="bg-primary-container/20 px-4 py-1 rounded-full">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">recycling</span>
      </div>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Vidrio</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">description</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Papel</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">inventory_2</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Envases</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">battery_charging_full</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Pilas</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span class="material-symbols-outlined">checkroom</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Ropa</span>
    </button>
  </nav>
</body>

</html>
