<!DOCTYPE html>

<html class="light" lang="es">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>ReciclaCAD - Detalle del Punto</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;family=DM+Sans:wght@400;500;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary-fixed-dim": "#4ae08f",
            "on-secondary-fixed": "#001c39",
            "error-container": "#ffdad6",
            "on-secondary-fixed-variant": "#004884",
            "surface-tint": "#006d3e",
            "surface-variant": "#e1e3e4",
            "on-primary": "#ffffff",
            "on-error-container": "#93000a",
            "secondary-fixed": "#d4e3ff",
            "on-primary-fixed": "#00210f",
            "surface-container-highest": "#e1e3e4",
            "on-surface-variant": "#3c4a3f",
            "secondary-container": "#499dfe",
            "error": "#ba1a1a",
            "surface-dim": "#d9dadb",
            "surface-container-low": "#f3f4f5",
            "outline-variant": "#bbcabc",
            "surface-container-lowest": "#ffffff",
            "tertiary-fixed": "#ffddb4",
            "on-secondary": "#ffffff",
            "on-tertiary-fixed": "#291800",
            "tertiary-container": "#f2a320",
            "inverse-primary": "#4ae08f",
            "tertiary-fixed-dim": "#ffb955",
            "secondary": "#005fad",
            "inverse-on-surface": "#f0f1f2",
            "on-error": "#ffffff",
            "on-tertiary": "#ffffff",
            "surface-container-high": "#e7e8e9",
            "primary-container": "#2ecc7d",
            "primary-fixed": "#6bfda9",
            "inverse-surface": "#2e3132",
            "on-secondary-container": "#003462",
            "surface-bright": "#f8f9fa",
            "tertiary": "#835500",
            "on-background": "#191c1d",
            "on-tertiary-container": "#613e00",
            "surface": "#f8f9fa",
            "on-surface": "#191c1d",
            "on-primary-container": "#00512c",
            "primary": "#006d3e",
            "on-primary-fixed-variant": "#00522d",
            "outline": "#6c7b6f",
            "on-tertiary-fixed-variant": "#633f00",
            "surface-container": "#edeeef",
            "background": "#f8f9fa",
            "secondary-fixed-dim": "#a4c9ff"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "fontFamily": {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Be Vietnam Pro"],
            "label": ["Be Vietnam Pro"],
            "dm": ["DM Sans"]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
    }

    .plus-jakarta {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .dm-sans {
      font-family: 'DM Sans', sans-serif;
    }
  </style>
</head>

<body class="bg-background text-on-background overflow-hidden">
  <!-- TopNavBar -->
  <header class="fixed top-0 left-0 w-full h-[56px] z-50 bg-[#2D2D2D] flex items-center px-4">
    <div
      class="flex items-center gap-2 text-base font-bold text-white font-['Plus_Jakarta_Sans'] tracking-tight before:content-[''] before:w-2 before:h-2 before:bg-[#2ECC7D] before:rounded-full">
      ReciclaCAD
    </div>
    <div class="ml-auto flex items-center gap-4">
      <button aria-label="Mi cuenta" class="text-gray-400 hover:opacity-80 transition-opacity active:scale-95 duration-200">
        <span aria-hidden="true" class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
      </button>
    </div>
  </header>
  <!-- Main Viewport Wrapper -->
  <div class="flex h-screen pt-[56px]">
    <!-- SideNavBar -->
    <aside class="hidden md:flex flex-col p-6 gap-6 w-[280px] bg-white h-full z-40 border-r border-outline-variant/15">
      <div class="space-y-1">
        <h2 class="font-headline text-lg font-bold text-on-surface">Encuentra tu punto</h2>
        <p class="font-dm text-sm leading-relaxed text-secondary">Cádiz Sostenible</p>
      </div>
      <nav class="flex flex-col gap-2">
        <button
          class="flex items-center gap-3 bg-[#2ECC7D]/10 text-[#006D3E] font-semibold rounded-full px-4 py-2 w-full text-left transition-transform duration-200 hover:bg-[#2ECC7D]/15 active:scale-[0.98]">
          <span aria-hidden="true" class="material-symbols-outlined text-lg" data-icon="recycling">recycling</span>
          <span class="font-dm text-sm">Vidrio</span>
        </button>
        <button
          class="flex items-center gap-3 text-gray-500 bg-gray-100 rounded-full px-4 py-2 w-full text-left hover:bg-gray-200 transition-colors active:scale-[0.98]">
          <span aria-hidden="true" class="material-symbols-outlined text-lg" data-icon="description">description</span>
          <span class="font-dm text-sm">Papel</span>
        </button>
        <button
          class="flex items-center gap-3 text-gray-500 bg-gray-100 rounded-full px-4 py-2 w-full text-left hover:bg-gray-200 transition-colors active:scale-[0.98]">
          <span aria-hidden="true" class="material-symbols-outlined text-lg" data-icon="inventory_2">inventory_2</span>
          <span class="font-dm text-sm">Envases</span>
        </button>
        <button
          class="flex items-center gap-3 text-gray-500 bg-gray-100 rounded-full px-4 py-2 w-full text-left hover:bg-gray-200 transition-colors active:scale-[0.98]">
          <span aria-hidden="true" class="material-symbols-outlined text-lg" data-icon="battery_charging_full">battery_charging_full</span>
          <span class="font-dm text-sm">Pilas</span>
        </button>
        <button
          class="flex items-center gap-3 text-gray-500 bg-gray-100 rounded-full px-4 py-2 w-full text-left hover:bg-gray-200 transition-colors active:scale-[0.98]">
          <span aria-hidden="true" class="material-symbols-outlined text-lg" data-icon="checkroom">checkroom</span>
          <span class="font-dm text-sm">Ropa</span>
        </button>
      </nav>
      <button
        class="mt-auto w-full py-3 px-4 bg-primary text-white rounded-full font-dm text-sm font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
        Filtrar Mapa
      </button>
    </aside>
    <!-- Content Canvas (Map Area) -->
    <main class="flex-1 relative bg-surface-container-low">
      <!-- Map Background Image -->
      <div class="absolute inset-0 z-0">
        <img alt="Plano urbano de Cádiz con calles y línea de costa en tonos grises suaves" class="w-full h-full object-cover opacity-60 grayscale-[20%]"
          data-location="Cádiz"
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuAReAK3WTzPqqwdpGtpb_6-2f-yn2qp2vX9t3K9MOPFeukaP0lvxW7g9g8u9fHqxzUqzlJri6-eCq1HXh_6GjBg1LxU-9FL3AIFIzO1FnpAJtStFm7AZhxbZyWGnaRSeYk_YOGzCPQUfG5hIbAmOl7FAFeaN2gtuUjbmE8PPddTP6Y_E9Wl3n69oX9ArnuVOjGcDiy3vAj5G3tjGGRAINrBEOaIOKtxDO29hF0pmfdxeZ_zPpCz00tm0QnmyqbZctHNdHTKHM8IPERN" />
      </div>
      <!-- Custom Floating Map Markers (Simulated) -->
      <button
        aria-label="Punto de reciclaje de vidrio"
        class="absolute top-1/3 left-1/4 z-10 w-11 h-11 bg-primary rounded-full border-4 border-white flex items-center justify-center text-white active:scale-90 transition-transform">
        <span aria-hidden="true" class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">recycling</span>
      </button>
      <button
        aria-label="Punto de reciclaje de vidrio — Plaza de las Flores (seleccionado)"
        class="absolute top-1/2 left-1/2 z-10 w-10 h-10 bg-[#006D3E] rounded-full border-4 border-white flex items-center justify-center text-white ring-4 ring-[#006D3E]/20">
        <span aria-hidden="true" class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">recycling</span>
      </button>
      <button
        aria-label="Punto de reciclaje de vidrio"
        class="absolute top-2/3 left-1/3 z-10 w-11 h-11 bg-primary-container rounded-full border-4 border-white flex items-center justify-center text-on-primary-container active:scale-90 transition-transform">
        <span aria-hidden="true" class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">recycling</span>
      </button>
      <!-- Floating Detail Card (Bottom Right) -->
      <div
        class="absolute bottom-8 right-8 z-30 w-[280px] bg-white border border-[#e0e0e0] rounded-[8px] p-4 flex flex-col gap-3">
        <div class="flex items-start justify-between">
          <h3 class="plus-jakarta font-medium text-[14px] leading-tight text-on-surface">Punto de Reciclaje - Plaza de
            las Flores</h3>
          <button aria-label="Añadir a favoritos" class="text-tertiary hover:scale-110 transition-transform">
            <span aria-hidden="true" class="material-symbols-outlined text-[18px]" data-icon="favorite">favorite</span>
          </button>
        </div>
        <!-- Chips Row -->
        <div class="flex flex-wrap gap-1.5">
          <div
            class="px-2.5 py-1 bg-primary-container/20 text-on-primary-container rounded-full text-[10px] font-bold uppercase tracking-wider">
            Vidrio</div>
          <div
            class="px-2.5 py-1 bg-surface-container-highest text-on-surface-variant rounded-full text-[10px] font-bold uppercase tracking-wider">
            L-V 08-20h</div>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="material-symbols-outlined text-[16px] text-outline" data-icon="near_me">near_me</span>
          <span class="dm-sans text-[12px] text-[#6c7b6f]">A 350 metros de tu ubicación</span>
        </div>
        <button
          class="w-full h-[36px] bg-[#2ECC7D] hover:bg-[#27b971] active:scale-[0.98] transition-all text-white dm-sans font-medium text-[13px] rounded-[8px] flex items-center justify-center gap-2 mt-1">
          Cómo llegar
        </button>
      </div>
      <!-- Contextual Map Tools (Floating Layout) -->
      <div class="absolute top-6 right-6 flex flex-col gap-2 z-20">
        <button
          aria-label="Ampliar mapa"
          class="w-10 h-10 bg-white/90 backdrop-blur-md rounded-lg flex items-center justify-center text-on-surface hover:bg-white transition-colors">
          <span aria-hidden="true" class="material-symbols-outlined">add</span>
        </button>
        <button
          aria-label="Alejar mapa"
          class="w-10 h-10 bg-white/90 backdrop-blur-md rounded-lg flex items-center justify-center text-on-surface hover:bg-white transition-colors">
          <span aria-hidden="true" class="material-symbols-outlined">remove</span>
        </button>
        <button
          aria-label="Mi ubicación"
          class="mt-4 w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white shadow-lg active:scale-95 transition-transform">
          <span aria-hidden="true" class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">my_location</span>
        </button>
      </div>
    </main>
  </div>
  <!-- BottomNavBar (Mobile Only) -->
  <nav aria-label="Categorías de reciclaje" class="md:hidden fixed bottom-0 left-0 w-full h-[72px] bg-white flex items-center justify-around px-2 z-50">
    <button class="flex flex-col items-center gap-1 text-[#006D3E] min-w-[44px] min-h-[44px] justify-center">
      <div class="bg-[#2ECC7D]/20 px-4 py-1 rounded-full">
        <span aria-hidden="true" class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">recycling</span>
      </div>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Vidrio</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span aria-hidden="true" class="material-symbols-outlined">description</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Papel</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span aria-hidden="true" class="material-symbols-outlined">inventory_2</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Envases</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span aria-hidden="true" class="material-symbols-outlined">battery_charging_full</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Pilas</span>
    </button>
    <button class="flex flex-col items-center gap-1 text-outline min-w-[44px] min-h-[44px] justify-center">
      <span aria-hidden="true" class="material-symbols-outlined">checkroom</span>
      <span class="text-[10px] font-bold uppercase tracking-tighter">Ropa</span>
    </button>
  </nav>
</body>

</html>
